services:
  - type: web
    name: natacion-backend
    env: node
    buildCommand: cd backend && npm install && npx prisma generate && npx prisma db push
    startCommand: cd backend && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: natacion-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: natacion-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist

databases:
  - name: natacion-db
    databaseName: natacion
    user: natacion_user
